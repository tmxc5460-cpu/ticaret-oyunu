<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İmparatorluk 3D: Açık Dünya</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .stat-bar { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 15px; border: 1px solid #6a82fb; color: #fff; pointer-events: auto; }
        
        /* Joystick Alanı */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); pointer-events: auto; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #6a82fb; border-radius: 50%; transform: translate(-50%, -50%); }

        /* Etkileşim Butonu */
        #action-btn { position: absolute; bottom: 50px; right: 40px; width: 80px; height: 80px; background: #fbc531; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #000; pointer-events: auto; box-shadow: 0 0 20px rgba(251, 197, 49, 0.5); }

        /* PWA Modal */
        #pwa-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; justify-content: center; align-items: center; pointer-events: auto; }
        .modal-box { background: #161b22; padding: 30px; border-radius: 25px; text-align: center; color: white; border: 1px solid #6a82fb; width: 80%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-bar">
            💰 <span id="money">209.154.549</span><br>
            📍 <span id="location">Şehir Merkezi</span>
        </div>

        <div id="joystick-zone"><div id="joystick-stick"></div></div>
        <div id="action-btn" onclick="checkAction()">TİCARET</div>
    </div>

    <div id="pwa-modal" class="hidden">
        <div class="modal-box">
            <h2>📲 Uygulamayı Yükle</h2>
            <p>3D Şehri daha akıcı oynamak için ana ekrana ekle!</p>
            <button onclick="installApp()" style="background:#6a82fb; color:white; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold;">YÜKLE</button>
            <button onclick="document.getElementById('pwa-modal').classList.add('hidden')" style="background:none; color:gray; border:none; margin-top:10px;">Sonra</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let joystickActive = false;
        let joyPos = { x: 0, y: 0 };

        const state = { money: 209154549 };

        init();
        animate();

        function init() {
            // Sahne ve Kamera
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0b10);
            scene.fog = new THREE.FogExp2(0x0a0b10, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.7; // İnsan boyu

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Işıklandırma
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);
            const sun = new THREE.DirectionalLight(0x6a82fb, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // Zemin (Şehir Meydanı)
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Binalar (Kutular)
            for (let i = 0; i < 40; i++) {
                const h = Math.random() * 20 + 5;
                const boxGeo = new THREE.BoxGeometry(5, h, 5);
                const boxMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
                const building = new THREE.Mesh(boxGeo, boxMat);
                building.position.set(Math.random() * 100 - 50, h/2, Math.random() * 100 - 50);
                scene.add(building);
            }

            // Joystick Kontrolü
            const joyZone = document.getElementById('joystick-zone');
            const joyStick = document.getElementById('joystick-stick');

            window.addEventListener('touchstart', e => { 
                if(e.target.id === 'joystick-zone' || e.target.id === 'joystick-stick') joystickActive = true; 
            });
            window.addEventListener('touchend', () => { 
                joystickActive = false; 
                joyStick.style.left = '50%'; joyStick.style.top = '50%';
                moveForward = moveBackward = moveLeft = moveRight = false;
            });
            window.addEventListener('touchmove', e => {
                if(!joystickActive) return;
                let touch = e.touches[0];
                let rect = joyZone.getBoundingClientRect();
                let x = touch.clientX - rect.left - rect.width/2;
                let y = touch.clientY - rect.top - rect.height/2;
                
                let dist = Math.min(Math.sqrt(x*x + y*y), 50);
                let angle = Math.atan2(y, x);
                
                joyStick.style.left = (50 + Math.cos(angle) * dist / rect.width * 100) + '%';
                joyStick.style.top = (50 + Math.sin(angle) * dist / rect.height * 100) + '%';

                moveForward = y < -10;
                moveBackward = y > 10;
                moveLeft = x < -10;
                moveRight = x > 10;
            });

            // 3 Saniye Sonra PWA Göster
            setTimeout(() => { document.getElementById('pwa-modal').classList.remove('hidden'); }, 3000);
        }

        function checkAction() {
            alert("🏦 MEKAN: BANKA\nIBAN: TR 5500 0100 9010 5466 7300 5001\nBuradan mülk satın alabilirsin!");
            state.money -= 10000000;
            document.getElementById('money').innerText = state.money.toLocaleString();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Yürüme Mantığı
            velocity.x -= velocity.x * 10.0 * 0.016;
            velocity.z -= velocity.z * 10.0 * 0.016;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 40.0 * 0.016;
            if (moveLeft || moveRight) velocity.x -= direction.x * 40.0 * 0.016;

            camera.translateX(-velocity.x * 0.016);
            camera.translateZ(-velocity.z * 0.016);
            camera.position.y = 1.7; // Yerde tut

            renderer.render(scene, camera);
        }

        function installApp() { alert("Uygulama yükleniyor..."); document.getElementById('pwa-modal').classList.add('hidden'); }
    </script>
</body>
</html>

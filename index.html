<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6a82fb">
    <title>Dünya Ticareti</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="install-banner" class="install-banner hidden">
        <span>📲 Uygulamayı ana ekrana ekle ve daha hızlı oyna!</span>
        <button id="install-btn">YÜKLE</button>
    </div>

    <div id="login-screen">
        <div class="hero">
            <h1 class="title">🌍 DÜNYA TİCARETİ</h1>
            <div class="stats-preview">195 Ülke | Kripto | Banka</div>
            <button id="start-game-btn" class="main-btn">🚀 OYUNA BAŞLA</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="mobile-stats-bar">
            <div class="m-stat">💰 <span id="p-money">100k</span></div>
            <div class="m-stat" style="color:#f7931a">₿ <span id="p-btc">0.0</span></div>
            <div class="m-stat">📍 <span id="p-location">TR</span></div>
        </div>

        <main id="app-container"></main>

        <nav class="bottom-nav">
            <div class="nav-item" onclick="ui.render('world')">🌍 Dünya</div>
            <div class="nav-item" onclick="ui.render('trade')">📦 Ticaret</div>
            <div class="nav-item" onclick="ui.render('crypto')">📈 Borsa</div>
            <div class="nav-item" onclick="ui.render('bank')">🏦 Banka</div>
            <div class="nav-item shop-special" onclick="ui.render('shop')">💎 Dükkan</div>
        </nav>
    </div>

    <script src="game-engine.js"></script>
</body>
</html>
